<h2>Your Files</h2>
<a href="{% url 'upload' %}">Upload File</a>
<a href="{% url 'logout' %}">Logout</a>

<ul>
{% for file in files %}
    <li>
        {{ file.original_name }}
        <a href="{% url 'download' file.id %}">Download</a>
        <form method="post" action="{% url 'delete' file.id %}" style="display: inline;">
            {% csrf_token %}
            <button type="submit" onclick="return confirm('Are you sure you want to delete {{ file.original_name }}?')">Delete</button>
        </form>
    </li>
{% empty %}
    <li>No files uploaded.</li>
{% endfor %}
</ul>
