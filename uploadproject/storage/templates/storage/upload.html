{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload File - Upload Project</title>
    <link rel="stylesheet" href="{% static 'storage/style.css' %}">
</head>
<body>
    <div class="container">
        <div class="form-container">
            <h2>Upload File</h2>
            {% if messages %}
                <div class="messages">
                    {% for message in messages %}
                        <div class="message {{ message.tags }}">{{ message }}</div>
                    {% endfor %}
                </div>
            {% endif %}
            <form method="post" enctype="multipart/form-data" class="d-flex flex-column">
                {% csrf_token %}
                <div class="form-group">
                    <label for="{{ form.file.id_for_label }}">Select File</label>
                    {{ form.file }}
                </div>
                <button type="submit" class="btn">Upload</button>
            </form>
            <p class="text-center mt-3">
                <a href="{% url 'dashboard' %}">Back to Dashboard</a>
            </p>
        </div>
    </div>
</body>
</html>
